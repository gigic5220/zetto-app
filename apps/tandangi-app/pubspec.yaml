name: tandangi
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  core_app:
  design_system:
  cupertino_icons: ^1.0.8
  flutter_flavorizr: ^2.4.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  image_picker: ^1.2.1
  google_sign_in: ^7.2.0
  dio: ^5.9.2
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  collection: ^1.19.1
  get_it: ^9.2.1
  talker: ^5.1.15
  talker_flutter: ^5.1.15
  talker_dio_logger: ^5.1.15
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  riverpod_annotation: ^4.0.2
  flutter_riverpod: ^3.2.1
  hooks_riverpod: ^3.2.1
  flutter_hooks: ^0.21.3+1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  skeletonizer: ^2.1.3
  flutter_native_splash: ^2.4.7
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  version: ^3.0.2
  webview_flutter: ^4.13.1
  kakao_flutter_sdk_user: ^1.9.9
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  carousel_slider: ^5.1.2
  intl: ^0.20.2
  flutter_gen_runner: ^5.13.0+1
  firebase_messaging: ^16.1.2
  app_links: ^7.0.0
  chalkdart: ^3.0.5
  firebase_storage: ^13.2.0
  flutter_image_compress: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.5
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  photo_manager: ^3.9.0
  photo_manager_image_provider: ^2.2.0
  custom_refresh_indicator: ^4.0.1
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+10
  in_app_purchase_storekit: ^0.4.8+1
  image: ^4.8.0
  crop_your_image: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/images/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
