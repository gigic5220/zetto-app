name: core_app
description: "A new Flutter package project."
version: 0.0.1
# homepage:

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  ### Core Dependencies ###
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1

  ### Native Dependencies ###
  flutter_secure_storage: ^10.0.0
  sensors_plus: ^7.0.0

  ### UI Dependencies ###
  design_system:
  flutter_svg: ^2.2.3
  skeletonizer: ^2.1.3
  custom_refresh_indicator: ^4.0.1

  ### Logger Dependencies ###
  talker_flutter: ^5.1.13
  chalkdart: ^3.0.5

  ### Utility Dependencies ###
  intl: ^0.20.2
  inspector: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

